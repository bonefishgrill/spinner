<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>peaceful computer</title>
  <meta property="og:title" content="peaceful computer">
  <meta property="og:description" content="Spin it.">
  <meta property="og:image" content="https://peaceful.computer/preview.png">
  <meta property="og:url" content="https://peaceful.computer">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://peaceful.computer/preview.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0a0a0a;
      overflow: hidden;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      color: #fff;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
    canvas {
      cursor: grab;
      touch-action: none;
    }
    canvas:active { cursor: grabbing; }
    .picker {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      border-top: 1px solid #262626;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .picker button {
      flex: 1;
      background: none;
      border: none;
      color: #4d4d4d;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 14px 0;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s;
    }
    .picker button.active { color: #fff; }
    .inf-toggle {
      position: fixed;
      top: 16px;
      right: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .inf-toggle label {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #4d4d4d;
      cursor: pointer;
      transition: color 0.15s;
    }
    .inf-toggle.active label { color: #fff; }
    .inf-switch {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }
    .inf-switch input { display: none; }
    .inf-switch-track {
      position: absolute;
      inset: 0;
      background: #262626;
      border-radius: 10px;
      transition: background 0.2s;
    }
    .inf-switch input:checked + .inf-switch-track { background: #555; }
    .inf-switch-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      background: #4d4d4d;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .inf-switch input:checked ~ .inf-switch-thumb {
      transform: translateX(16px);
      background: #fff;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="inf-toggle" id="infToggle">
    <label for="infCheck">∞</label>
    <label class="inf-switch">
      <input type="checkbox" id="infCheck">
      <div class="inf-switch-track"></div>
      <div class="inf-switch-thumb"></div>
    </label>
  </div>
  <div class="picker">
    <button data-sound="voice">Voice</button>
    <button class="active" data-sound="saxophone">Sax</button>
    <button data-sound="keyboard">Keys</button>
    <button data-sound="trombone">Bone</button>
    <button data-sound="bubbles">Bubbles</button>
    <button data-sound="bells">Afternoon</button>
  </div>

<script>
// --- State ---
let rotation = 0;
let angularVelocity = 0;
let isDragging = false;
let lastAngle = null;
let lastDragTime = 0;
let selectedSound = 'saxophone';
let audioCtx = null;
let infiniteMode = false;
let lfoPhase1 = 0, lfoPhase2 = 0, lfoPhase3 = 0;
let infiniteVel = 150;

// --- Canvas ---
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const SIZE = 240;
let scale = 1;

function resize() {
  scale = window.devicePixelRatio || 1;
  canvas.width = SIZE * scale;
  canvas.height = SIZE * scale;
  canvas.style.width = SIZE + 'px';
  canvas.style.height = SIZE + 'px';
}
resize();
window.addEventListener('resize', resize);

function drawYinYang() {
  ctx.save();
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
  ctx.clearRect(0, 0, SIZE, SIZE);
  const cx = SIZE / 2, cy = SIZE / 2, r = 108;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation * Math.PI / 180);

  // Clip circle
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.clip();

  // Light half
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();

  // Dark half (left)
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(-r, -r, r, r * 2);

  // Dark bump top
  ctx.beginPath();
  ctx.arc(0, -r / 2, r / 2, 0, Math.PI * 2);
  ctx.fill();

  // Light bump bottom
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath();
  ctx.arc(0, r / 2, r / 2, 0, Math.PI * 2);
  ctx.fill();

  // Light dot in dark
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath();
  ctx.arc(0, -r / 2, r * 0.19, 0, Math.PI * 2);
  ctx.fill();

  // Dark dot in light
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(0, r / 2, r * 0.19, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
  ctx.restore();
}

// --- Pointer math ---
function getAngle(x, y) {
  const rect = canvas.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  return Math.atan2(y - cy, x - cx) * 180 / Math.PI;
}

function pointerDown(x, y) {
  ensureAudio();
  // Brake
  if (!isDragging && Math.abs(angularVelocity) > 10) {
    triggerRecordStop();
    angularVelocity = 0;
  }
  isDragging = true;
  lastAngle = getAngle(x, y);
  lastDragTime = performance.now();
}

function pointerMove(x, y) {
  if (!isDragging) return;
  const angle = getAngle(x, y);
  if (lastAngle !== null) {
    let delta = angle - lastAngle;
    if (delta > 180) delta -= 360;
    if (delta < -180) delta += 360;
    const now = performance.now();
    const dt = (now - lastDragTime) / 1000;
    if (dt > 0) angularVelocity = delta / dt;
    rotation += delta;
    lastDragTime = now;

  }
  lastAngle = angle;
}

function pointerUp() {
  isDragging = false;
  lastAngle = null;
}

// Mouse
canvas.addEventListener('mousedown', e => { e.preventDefault(); pointerDown(e.clientX, e.clientY); });
window.addEventListener('mousemove', e => pointerMove(e.clientX, e.clientY));
window.addEventListener('mouseup', pointerUp);
// Touch
canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; pointerDown(t.clientX, t.clientY); }, { passive: false });
window.addEventListener('touchmove', e => { const t = e.touches[0]; pointerMove(t.clientX, t.clientY); }, { passive: false });
window.addEventListener('touchend', pointerUp);

// --- Sound picker ---
document.querySelectorAll('.picker button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.picker button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedSound = btn.dataset.sound;
  });
});

// --- Infinite mode ---
document.getElementById('infCheck').addEventListener('change', e => {
  ensureAudio();
  infiniteMode = e.target.checked;
  document.getElementById('infToggle').classList.toggle('active', infiniteMode);
});

// --- Audio engine ---
let saxBuffer = null;
let saxSource = null;
let saxGain = null;
let saxPlaying = false;
let saxReverb = null;
let saxReverbGain = null;
let saxDelay = null;
let saxDelayFeedback = null;
let saxDelayGain = null;
let olegBuffer = null;
let olegSource = null;
let olegGain = null;
let olegPlaying = false;
let olegReverb = null;
let olegReverbGain = null;
let olegDelay = null;
let olegDelayFeedback = null;
let olegDelayGain = null;
let synthProcessor = null;
let synthGain = null;
let synthReverbSend = null;
let bellReverbSend = null;
let bellReverbGain = null;

function ensureAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  // Load sax mp3
  fetch('audio/sax.mp3')
    .then(r => r.arrayBuffer())
    .then(buf => audioCtx.decodeAudioData(buf))
    .then(decoded => {
      // Trim first 1 second
      const skipFrames = Math.floor(decoded.sampleRate * 1);
      const remaining = decoded.length - skipFrames;
      const trimmed = audioCtx.createBuffer(decoded.numberOfChannels, remaining, decoded.sampleRate);
      for (let ch = 0; ch < decoded.numberOfChannels; ch++) {
        const src = decoded.getChannelData(ch);
        const dst = trimmed.getChannelData(ch);
        dst.set(src.subarray(skipFrames));
      }
      // Crossfade loop seam: blend last 0.3s into first 0.3s
      const xfadeFrames = Math.floor(decoded.sampleRate * 0.3);
      for (let ch = 0; ch < trimmed.numberOfChannels; ch++) {
        const d = trimmed.getChannelData(ch);
        const len = trimmed.length;
        for (let i = 0; i < xfadeFrames; i++) {
          const t = i / xfadeFrames;
          const fadeIn  = Math.sin(t * Math.PI / 2);
          const fadeOut = Math.cos(t * Math.PI / 2);
          d[i] = d[i] * fadeIn + d[len - xfadeFrames + i] * fadeOut;
        }
        for (let i = len - xfadeFrames; i < len; i++) {
          d[i] *= Math.cos(((i - (len - xfadeFrames)) / xfadeFrames) * Math.PI / 2);
        }
      }
      saxBuffer = trimmed;
    })
    .catch(e => console.warn('Failed to load sax audio:', e));

  // Load oleg mp3 (throat singing) for Voice mode
  fetch('audio/oleg.mp3')
    .then(r => r.arrayBuffer())
    .then(buf => audioCtx.decodeAudioData(buf))
    .then(decoded => {
      const skipFrames = Math.floor(decoded.sampleRate * 1);
      const remaining = decoded.length - skipFrames;
      const trimmed = audioCtx.createBuffer(decoded.numberOfChannels, remaining, decoded.sampleRate);
      for (let ch = 0; ch < decoded.numberOfChannels; ch++) {
        const src = decoded.getChannelData(ch);
        trimmed.getChannelData(ch).set(src.subarray(skipFrames));
      }
      const xfadeFrames = Math.floor(decoded.sampleRate * 0.5);
      for (let ch = 0; ch < trimmed.numberOfChannels; ch++) {
        const d = trimmed.getChannelData(ch);
        const len = trimmed.length;
        for (let i = 0; i < xfadeFrames; i++) {
          const t = i / xfadeFrames;
          d[i] = d[i] * Math.sin(t * Math.PI / 2) + d[len - xfadeFrames + i] * Math.cos(t * Math.PI / 2);
        }
        for (let i = len - xfadeFrames; i < len; i++) {
          d[i] *= Math.cos(((i - (len - xfadeFrames)) / xfadeFrames) * Math.PI / 2);
        }
      }
      olegBuffer = trimmed;
    })
    .catch(e => console.warn('Failed to load oleg audio:', e));

  // Oleg gain node
  olegGain = audioCtx.createGain();
  olegGain.gain.value = 0;
  olegGain.connect(audioCtx.destination);

  // Oleg reverb — 4s tail
  const olegIrLen = Math.floor(audioCtx.sampleRate * 4.0);
  const olegIrBuf = audioCtx.createBuffer(2, olegIrLen, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = olegIrBuf.getChannelData(ch);
    for (let i = 0; i < olegIrLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / olegIrLen, 1.8);
  }
  olegReverb = audioCtx.createConvolver();
  olegReverb.buffer = olegIrBuf;
  olegReverbGain = audioCtx.createGain();
  olegReverbGain.gain.value = 0;
  olegGain.connect(olegReverb);
  olegReverb.connect(olegReverbGain);
  olegReverbGain.connect(audioCtx.destination);

  // Oleg delay with feedback
  olegDelay = audioCtx.createDelay(2.0);
  olegDelay.delayTime.value = 0.38;
  olegDelayFeedback = audioCtx.createGain();
  olegDelayFeedback.gain.value = 0.40;
  olegDelayGain = audioCtx.createGain();
  olegDelayGain.gain.value = 0;
  olegGain.connect(olegDelay);
  olegDelay.connect(olegDelayFeedback);
  olegDelayFeedback.connect(olegDelay);
  olegDelay.connect(olegDelayGain);
  olegDelayGain.connect(audioCtx.destination);

  // Sax gain node
  saxGain = audioCtx.createGain();
  saxGain.gain.value = 0;
  saxGain.connect(audioCtx.destination);

  // Sax reverb — synthetic impulse response
  const irLen = Math.floor(audioCtx.sampleRate * 3.5);
  const irBuf = audioCtx.createBuffer(2, irLen, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = irBuf.getChannelData(ch);
    for (let i = 0; i < irLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLen, 2.0);
  }
  saxReverb = audioCtx.createConvolver();
  saxReverb.buffer = irBuf;
  saxReverbGain = audioCtx.createGain();
  saxReverbGain.gain.value = 0;
  saxGain.connect(saxReverb);
  saxReverb.connect(saxReverbGain);
  saxReverbGain.connect(audioCtx.destination);

  // Sax delay with feedback
  saxDelay = audioCtx.createDelay(2.0);
  saxDelay.delayTime.value = 0.42;
  saxDelayFeedback = audioCtx.createGain();
  saxDelayFeedback.gain.value = 0.45;
  saxDelayGain = audioCtx.createGain();
  saxDelayGain.gain.value = 0;
  saxGain.connect(saxDelay);
  saxDelay.connect(saxDelayFeedback);
  saxDelayFeedback.connect(saxDelay);
  saxDelay.connect(saxDelayGain);
  saxDelayGain.connect(audioCtx.destination);

  // Synth via ScriptProcessor
  const BLOCK = 2048;
  synthProcessor = audioCtx.createScriptProcessor(BLOCK, 0, 1);

  // Synth state
  const synth = {
    phase: 0, amp: 0,
    junoPhases: [0, 0, 0, 0],
    chorusPhase: 0,
    filterState: 0,
    // Record stop
    stopAmount: 0,
    stopRate: 1,
    stopBuffer: null,
    stopOffset: 0,
    // Bubbles
    bubbles: [],
    bubbleTimer: 0,
    waterNoise: 0,
    // Bell (Afternoon) voices
    bells: Array.from({length: 8}, () => ({ phase: Math.random(), freq: 130.81, amp: 0, target: 0, timer: Math.floor(Math.random() * 176400) })),
    bellsInit: false,
    // Infinite keys chord crossfade
    keysChordBlend: 1.0,
    keysPrevFreqs: [130.81, 155.56, 196.00, 233.08],
    // Infinite keys
    keysChordIdx: 0,
    keysChordTimer: 0,
    keysMelodyPhase: 0,
    keysMelodyAmp: 0,
    keysMelodyIdx: 0,
    keysMelodyTimer: 0,
  };

  const INF_CHORDS = [
    [130.81, 155.56, 196.00, 233.08], // Cm7
    [174.61, 207.65, 261.63, 311.13], // Fm7
    [196.00, 233.08, 293.66, 349.23], // Gm7
    [207.65, 261.63, 311.13, 392.00], // Abmaj7
  ];
  const INF_MELODY = [261.63, 293.66, 311.13, 349.23, 392.00, 349.23, 311.13, 293.66];
  // C minor pentatonic across 3 octaves: C Eb F G Bb
  const BELL_FREQS = [65.41, 98.00, 116.54, 130.81, 155.56, 174.61, 196.00, 233.08, 261.63, 311.13, 349.23, 392.00, 466.16];

  synthProcessor.onaudioprocess = function(e) {
    const output = e.outputBuffer.getChannelData(0);
    const sr = audioCtx.sampleRate;
    const vel = infiniteMode ? Math.max(Math.abs(angularVelocity), infiniteVel) : Math.abs(angularVelocity);
    const sound = selectedSound;
    const isKeys = sound === 'keyboard';
    const isBone = sound === 'trombone';
    const isBubbles = sound === 'bubbles';
    const isBells   = sound === 'bells';
    const isSynth = isKeys || isBone;

    let targetAmp = 0;
    if (isKeys) {
      targetAmp = infiniteMode ? 0.35 : Math.min(vel / 120, 0.5);
    } else if (isBone) {
      targetAmp = Math.min(vel / 300, 0.45);
    }

    // Juno chord frequencies
    const pitchScale = Math.max(0.5, Math.min(vel / 200, 1));
    const junoFreqs = (isKeys && infiniteMode)
      ? INF_CHORDS[synth.keysChordIdx]
      : [130.81 * pitchScale, 155.56 * pitchScale, 196.0 * pitchScale, 233.08 * pitchScale];
    const detuneAmounts = [0.998, 1.004, 0.996, 1.003];

    if (isKeys && infiniteMode) {
      synth.keysChordTimer += output.length;
      if (synth.keysChordTimer >= sr * 10) {
        synth.keysChordTimer -= sr * 10;
        synth.keysPrevFreqs = INF_CHORDS[synth.keysChordIdx].slice();
        synth.keysChordIdx = (synth.keysChordIdx + 1) % INF_CHORDS.length;
        synth.keysChordBlend = 0;
      }
      synth.keysChordBlend = Math.min(synth.keysChordBlend + output.length / (sr * 3), 1.0);
      synth.keysMelodyTimer += output.length;
      if (synth.keysMelodyTimer >= sr * 5) {
        synth.keysMelodyTimer -= sr * 5;
        synth.keysMelodyIdx = (synth.keysMelodyIdx + 1) % INF_MELODY.length;
      }
    }

    for (let i = 0; i < output.length; i++) {
      const smoothing = isKeys ? (targetAmp > synth.amp ? 0.03 : 0.015) : 0.002;
      synth.amp += (targetAmp - synth.amp) * smoothing;

      let s = 0;

      if (isKeys) {
        // Chorus LFO
        synth.chorusPhase += 0.6 / sr;
        if (synth.chorusPhase >= 1) synth.chorusPhase -= 1;
        const chorusMod = Math.sin(2 * Math.PI * synth.chorusPhase);

        let mix = 0;
        for (let v = 0; v < 4; v++) {
          const detune = detuneAmounts[v] + chorusMod * 0.002;
          const baseFreq = infiniteMode
            ? (1 - synth.keysChordBlend) * synth.keysPrevFreqs[v] + synth.keysChordBlend * INF_CHORDS[synth.keysChordIdx][v]
            : junoFreqs[v];
          const f = baseFreq * detune;
          synth.junoPhases[v] += f / sr;
          if (synth.junoPhases[v] >= 1) synth.junoPhases[v] -= 1;

          const saw = 2 * synth.junoPhases[v] - 1;
          const pw = 0.5 + chorusMod * 0.15;
          const pulse = synth.junoPhases[v] < pw ? 0.6 : -0.6;
          mix += (saw * 0.5 + pulse * 0.5) * 0.25;
        }

        const cutoff = 0.15 + synth.amp * 0.3;
        synth.filterState += cutoff * (mix - synth.filterState);
        s = synth.filterState * synth.amp;

        if (infiniteMode) {
          synth.keysMelodyAmp += (0.09 - synth.keysMelodyAmp) * 0.0008;
          synth.keysMelodyPhase += INF_MELODY[synth.keysMelodyIdx] / sr;
          if (synth.keysMelodyPhase >= 1) synth.keysMelodyPhase -= 1;
          s += Math.sin(2 * Math.PI * synth.keysMelodyPhase) * synth.keysMelodyAmp;
        }

      } else if (isBone) {
        const slide = Math.min(vel / 300, 1);
        const freq = 29.14 * Math.pow(2, slide);
        synth.phase += freq / sr;
        if (synth.phase >= 1) synth.phase -= 1;

        const p = 2 * Math.PI * synth.phase;
        const raw = Math.sin(p) * 0.35 + Math.sin(p*2) * 0.25 + Math.sin(p*3) * 0.20
                  + Math.sin(p*4) * 0.12 + Math.sin(p*5) * 0.06 + Math.sin(p*6) * 0.03;
        s = Math.max(-0.7, Math.min(raw, 0.7)) * synth.amp;
      } else if (isBubbles) {
        synth.bubbleTimer--;
        if (vel > 5 && synth.bubbleTimer <= 0) {
          const rate = infiniteMode ? Math.min(vel / 150, 2) : Math.min(vel / 25, 25);
          synth.bubbleTimer = Math.floor(sr / rate * (0.5 + Math.random() * 0.5));
          synth.bubbles.push({ phase: 0, freq: 120 + Math.random() * 400, amp: 0.18 + Math.random() * 0.12, decay: 0.9988 + Math.random() * 0.0008 });
        }
        for (let j = synth.bubbles.length - 1; j >= 0; j--) {
          const b = synth.bubbles[j];
          s += Math.sin(2 * Math.PI * b.phase) * b.amp;
          b.phase += b.freq / sr;
          if (b.phase >= 1) b.phase -= 1;
          b.amp *= b.decay;
          if (b.amp < 0.001) synth.bubbles.splice(j, 1);
        }
        const wNoise = (Math.random() * 2 - 1) * 0.012;
        synth.waterNoise += 0.05 * (wNoise - synth.waterNoise);
        s += synth.waterNoise * Math.min(vel / 80, 1);
      } else if (isBells) {
        if (!synth.bellsInit) {
          synth.bellsInit = true;
          for (let v = 0; v < synth.bells.length; v++) {
            synth.bells[v].freq = BELL_FREQS[Math.floor(Math.random() * BELL_FREQS.length)];
          }
        }
        const bellVol = infiniteMode ? 1.0 : Math.min(vel / 80, 1.0);
        for (let v = 0; v < synth.bells.length; v++) {
          const bv = synth.bells[v];
          bv.timer--;
          if (bv.timer <= 0) {
            if (bv.target > 0) {
              bv.target = 0;
              bv.timer = Math.floor(sr * (4 + Math.random() * 10));
            } else {
              bv.freq = BELL_FREQS[Math.floor(Math.random() * BELL_FREQS.length)];
              bv.target = 0.09 + Math.random() * 0.05;
              bv.timer = Math.floor(sr * (3 + Math.random() * 7));
            }
          }
          const k = bv.target > bv.amp ? 0.00001 : 0.000006;
          bv.amp += (bv.target - bv.amp) * k;
          bv.phase += bv.freq / sr;
          if (bv.phase >= 1) bv.phase -= 1;
          s += (Math.sin(2 * Math.PI * bv.phase) * 0.88 + Math.sin(4 * Math.PI * bv.phase) * 0.12) * bv.amp * bellVol;
        }
      }

      // Record-stop effect
      if (synth.stopAmount > 0.001 && synth.stopBuffer) {
        const buf = synth.stopBuffer;
        const idx = Math.floor(synth.stopOffset);
        if (idx >= 0 && idx < buf.length - 1) {
          const frac = synth.stopOffset - idx;
          const s0 = buf[idx];
          const s1 = buf[idx + 1];
          s += (s0 + frac * (s1 - s0)) * synth.stopAmount;
        }
        synth.stopOffset += Math.max(synth.stopRate, 0);
        synth.stopRate *= 0.9997;
        synth.stopAmount *= 0.9998;
        if (synth.stopRate < 0.01) synth.stopAmount = 0;
      }

      output[i] = s;
    }
  };

  synthGain = audioCtx.createGain();
  synthGain.gain.value = 1;
  synthProcessor.connect(synthGain);
  synthGain.connect(audioCtx.destination);
  synthReverbSend = audioCtx.createGain();
  synthReverbSend.gain.value = 0;
  synthGain.connect(synthReverbSend);
  synthReverbSend.connect(saxReverb);

  // Bell (Afternoon) reverb — long, room-filling, 6-second tail
  const bellIrLen = Math.floor(audioCtx.sampleRate * 6);
  const bellIrBuf = audioCtx.createBuffer(2, bellIrLen, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = bellIrBuf.getChannelData(ch);
    for (let i = 0; i < bellIrLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bellIrLen, 1.2);
  }
  const bellReverb = audioCtx.createConvolver();
  bellReverb.buffer = bellIrBuf;
  bellReverbGain = audioCtx.createGain();
  bellReverbGain.gain.value = 1.0;
  bellReverbSend = audioCtx.createGain();
  bellReverbSend.gain.value = 0;
  synthGain.connect(bellReverbSend);
  bellReverbSend.connect(bellReverb);
  bellReverb.connect(bellReverbGain);
  bellReverbGain.connect(audioCtx.destination);

  // Store synth ref for record stop
  synthProcessor._synth = synth;
}

// --- Sax playback ---
function updateSax() {
  if (!audioCtx || !saxBuffer) return;
  const vel = infiniteMode ? Math.max(Math.abs(angularVelocity), infiniteVel) : Math.abs(angularVelocity);

  if (selectedSound === 'saxophone') {
    if (!saxPlaying && vel > 2) {
      saxSource = audioCtx.createBufferSource();
      saxSource.buffer = saxBuffer;
      saxSource.loop = true;
      saxSource.connect(saxGain);
      saxSource.start();
      saxPlaying = true;
    }
    if (saxPlaying) {
      if (infiniteMode) {
        saxSource.playbackRate.setTargetAtTime(1.0, audioCtx.currentTime, 0.3);
        saxGain.gain.setTargetAtTime(0.8, audioCtx.currentTime, 0.3);
      } else {
        const rate = Math.max(0.5, Math.min(vel / 200, 1));
        saxSource.playbackRate.setTargetAtTime(rate, audioCtx.currentTime, 0.05);
        saxGain.gain.setTargetAtTime(Math.min(vel / 80, 1), audioCtx.currentTime, 0.05);
      }
    }
    if (saxReverbGain) {
      saxReverbGain.gain.setTargetAtTime(infiniteMode ? 0.55 : 0, audioCtx.currentTime, 0.4);
      saxDelayGain.gain.setTargetAtTime(infiniteMode ? 0.4 : 0, audioCtx.currentTime, 0.4);
    }
    if (saxPlaying && vel <= 2) {
      saxSource.stop();
      saxPlaying = false;
    }
  } else {
    if (saxPlaying) {
      saxSource.stop();
      saxPlaying = false;
    }
    saxGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
    if (saxReverbGain) {
      saxReverbGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.4);
      saxDelayGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.4);
    }
  }
}

// --- Oleg (Voice) playback ---
function updateOleg() {
  if (!audioCtx || !olegBuffer) return;
  const vel = infiniteMode ? Math.max(Math.abs(angularVelocity), infiniteVel) : Math.abs(angularVelocity);

  if (selectedSound === 'voice') {
    if (!olegPlaying && vel > 2) {
      olegSource = audioCtx.createBufferSource();
      olegSource.buffer = olegBuffer;
      olegSource.loop = true;
      olegSource.connect(olegGain);
      olegSource.start();
      olegPlaying = true;
    }
    if (olegPlaying) {
      if (infiniteMode) {
        olegSource.playbackRate.setTargetAtTime(1.0, audioCtx.currentTime, 0.3);
        olegGain.gain.setTargetAtTime(0.8, audioCtx.currentTime, 0.3);
      } else {
        const rate = Math.max(0.5, Math.min(vel / 200, 1));
        olegSource.playbackRate.setTargetAtTime(rate, audioCtx.currentTime, 0.05);
        olegGain.gain.setTargetAtTime(Math.min(vel / 80, 1), audioCtx.currentTime, 0.05);
      }
    }
    olegReverbGain.gain.setTargetAtTime(0.55, audioCtx.currentTime, 0.4);
    olegDelayGain.gain.setTargetAtTime(0.35, audioCtx.currentTime, 0.4);
    if (olegPlaying && vel <= 2) {
      olegSource.stop();
      olegPlaying = false;
    }
  } else {
    if (olegPlaying) {
      olegSource.stop();
      olegPlaying = false;
    }
    olegGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
    olegReverbGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.4);
    olegDelayGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.4);
  }
}

// --- Record stop ---
function triggerRecordStop() {
  if (!audioCtx) return;
  // For sax: grab current buffer data and stop playback
  if (selectedSound === 'saxophone' && saxPlaying && saxBuffer) {
    const data = saxBuffer.getChannelData(0);
    const synth = synthProcessor._synth;
    synth.stopBuffer = data;
    synth.stopOffset = 0; // approximate
    synth.stopRate = 1;
    synth.stopAmount = 0.25;
    saxSource.stop();
    saxPlaying = false;
  }
}

// --- Voice (Web Speech API) ---
let speaking = false;
function speak(velocity) {
  if (speaking || !window.speechSynthesis) return;
  speaking = true;

  const utterance = new SpeechSynthesisUtterance();
  if (velocity > 0) {
    const phrases = ['\u65CB\u8F6C\uFF01', '\u592A\u6781\uFF01', '\u54CE\u5440\uFF01', '\u597D\u7684\u597D\u7684\uFF01', '\u4E0D\u9519\u4E0D\u9519\uFF01', '\u54C7\uFF01', '\u5389\u5BB3\u554A\uFF01'];
    utterance.text = phrases[Math.floor(Math.random() * phrases.length)];
    utterance.lang = 'zh-CN';
    utterance.rate = 0.5;
  } else {
    const phrases = ['faster', 'tai chi', 'keep going', 'beautiful', "don't stop", 'spin it'];
    utterance.text = phrases[Math.floor(Math.random() * phrases.length)];
    utterance.lang = 'en-US';
    utterance.rate = 0.1;
  }
  utterance.onend = () => { speaking = false; };
  utterance.onerror = () => { speaking = false; };
  speechSynthesis.speak(utterance);
}

// --- Main loop ---
function tick() {
  lfoPhase1 = (lfoPhase1 + 0.05 / 60) % 1;
  lfoPhase2 = (lfoPhase2 + 0.11 / 60) % 1;
  lfoPhase3 = (lfoPhase3 + 0.19 / 60) % 1;
  const lfoVal = Math.sin(2 * Math.PI * lfoPhase1) * 0.5
               + Math.sin(2 * Math.PI * lfoPhase2) * 0.3
               + Math.sin(2 * Math.PI * lfoPhase3) * 0.2;
  infiniteVel = 150 + lfoVal * 70;

  if (!isDragging) {
    if (infiniteMode) {
      const grooveMag = 35 + lfoVal * 20;
      const dir = angularVelocity >= 0 ? 1 : -1;
      angularVelocity += (dir * grooveMag - angularVelocity) * 0.004;
      if (Math.abs(angularVelocity) > grooveMag * 2) angularVelocity *= 0.99;
      rotation += angularVelocity * 0.016;
    } else if (Math.abs(angularVelocity) > 0.1) {
      rotation += angularVelocity * 0.016;
      angularVelocity *= 0.995;
    } else {
      angularVelocity = 0;
    }
  }

  if (synthReverbSend && audioCtx) {
    const keysWet = (infiniteMode && selectedSound === 'keyboard') ? 0.45 : 0;
    synthReverbSend.gain.setTargetAtTime(keysWet, audioCtx.currentTime, 0.4);
    const bellWet = selectedSound === 'bells' ? 0.72 : 0;
    bellReverbSend.gain.setTargetAtTime(bellWet, audioCtx.currentTime, 0.6);
  }

  updateSax();
  updateOleg();
  drawYinYang();
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
