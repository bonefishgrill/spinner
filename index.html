<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spinner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0a0a0a;
      overflow: hidden;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      color: #fff;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
    canvas {
      cursor: grab;
      touch-action: none;
    }
    canvas:active { cursor: grabbing; }
    .picker {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      border-top: 1px solid #262626;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .picker button {
      flex: 1;
      background: none;
      border: none;
      color: #4d4d4d;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 14px 0;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s;
    }
    .picker button.active { color: #fff; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="picker">
    <button data-sound="voice">Voice</button>
    <button class="active" data-sound="saxophone">Sax</button>
    <button data-sound="keyboard">Keys</button>
    <button data-sound="trombone">Bone</button>
    <button data-sound="bubbles">Bubbles</button>
  </div>

<script>
// --- State ---
let rotation = 0;
let angularVelocity = 0;
let isDragging = false;
let lastAngle = null;
let lastDragTime = 0;
let selectedSound = 'saxophone';
let audioCtx = null;

// --- Canvas ---
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const SIZE = 240;
let scale = 1;

function resize() {
  scale = window.devicePixelRatio || 1;
  canvas.width = SIZE * scale;
  canvas.height = SIZE * scale;
  canvas.style.width = SIZE + 'px';
  canvas.style.height = SIZE + 'px';
}
resize();
window.addEventListener('resize', resize);

function drawYinYang() {
  ctx.save();
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
  ctx.clearRect(0, 0, SIZE, SIZE);
  const cx = SIZE / 2, cy = SIZE / 2, r = 108;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation * Math.PI / 180);

  // Clip circle
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.clip();

  // Light half
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();

  // Dark half (left)
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(-r, -r, r, r * 2);

  // Dark bump top
  ctx.beginPath();
  ctx.arc(0, -r / 2, r / 2, 0, Math.PI * 2);
  ctx.fill();

  // Light bump bottom
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath();
  ctx.arc(0, r / 2, r / 2, 0, Math.PI * 2);
  ctx.fill();

  // Light dot in dark
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath();
  ctx.arc(0, -r / 2, r * 0.19, 0, Math.PI * 2);
  ctx.fill();

  // Dark dot in light
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(0, r / 2, r * 0.19, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
  ctx.restore();
}

// --- Pointer math ---
function getAngle(x, y) {
  const rect = canvas.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  return Math.atan2(y - cy, x - cx) * 180 / Math.PI;
}

function pointerDown(x, y) {
  ensureAudio();
  // Brake
  if (!isDragging && Math.abs(angularVelocity) > 10) {
    triggerRecordStop();
    angularVelocity = 0;
  }
  isDragging = true;
  lastAngle = getAngle(x, y);
  lastDragTime = performance.now();
}

function pointerMove(x, y) {
  if (!isDragging) return;
  const angle = getAngle(x, y);
  if (lastAngle !== null) {
    let delta = angle - lastAngle;
    if (delta > 180) delta -= 360;
    if (delta < -180) delta += 360;
    const now = performance.now();
    const dt = (now - lastDragTime) / 1000;
    if (dt > 0) angularVelocity = delta / dt;
    rotation += delta;
    lastDragTime = now;

    if (selectedSound === 'voice' && Math.abs(angularVelocity) > 30) {
      speak(angularVelocity);
    }
  }
  lastAngle = angle;
}

function pointerUp() {
  isDragging = false;
  lastAngle = null;
}

// Mouse
canvas.addEventListener('mousedown', e => { e.preventDefault(); pointerDown(e.clientX, e.clientY); });
window.addEventListener('mousemove', e => pointerMove(e.clientX, e.clientY));
window.addEventListener('mouseup', pointerUp);
// Touch
canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; pointerDown(t.clientX, t.clientY); }, { passive: false });
window.addEventListener('touchmove', e => { const t = e.touches[0]; pointerMove(t.clientX, t.clientY); }, { passive: false });
window.addEventListener('touchend', pointerUp);

// --- Sound picker ---
document.querySelectorAll('.picker button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.picker button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedSound = btn.dataset.sound;
  });
});

// --- Audio engine ---
let saxBuffer = null;
let saxSource = null;
let saxGain = null;
let saxPlaying = false;
let synthProcessor = null;
let synthGain = null;

function ensureAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  // Load sax mp3
  fetch('audio/sax.mp3')
    .then(r => r.arrayBuffer())
    .then(buf => audioCtx.decodeAudioData(buf))
    .then(decoded => {
      // Trim first 1 second
      const skipFrames = Math.floor(decoded.sampleRate * 1);
      const remaining = decoded.length - skipFrames;
      const trimmed = audioCtx.createBuffer(decoded.numberOfChannels, remaining, decoded.sampleRate);
      for (let ch = 0; ch < decoded.numberOfChannels; ch++) {
        const src = decoded.getChannelData(ch);
        const dst = trimmed.getChannelData(ch);
        dst.set(src.subarray(skipFrames));
      }
      saxBuffer = trimmed;
    })
    .catch(e => console.warn('Failed to load sax audio:', e));

  // Sax gain node
  saxGain = audioCtx.createGain();
  saxGain.gain.value = 0;
  saxGain.connect(audioCtx.destination);

  // Synth via ScriptProcessor
  const BLOCK = 2048;
  synthProcessor = audioCtx.createScriptProcessor(BLOCK, 0, 1);

  // Synth state
  const synth = {
    phase: 0, amp: 0,
    junoPhases: [0, 0, 0, 0],
    chorusPhase: 0,
    filterState: 0,
    // Record stop
    stopAmount: 0,
    stopRate: 1,
    stopBuffer: null,
    stopOffset: 0,
    // Bubbles
    bubbles: [],
    bubbleTimer: 0,
    waterNoise: 0,
  };

  synthProcessor.onaudioprocess = function(e) {
    const output = e.outputBuffer.getChannelData(0);
    const sr = audioCtx.sampleRate;
    const vel = Math.abs(angularVelocity);
    const sound = selectedSound;
    const isKeys = sound === 'keyboard';
    const isBone = sound === 'trombone';
    const isBubbles = sound === 'bubbles';
    const isSynth = isKeys || isBone;

    let targetAmp = 0;
    if (isKeys) {
      targetAmp = Math.min(vel / 120, 0.5);
    } else if (isBone) {
      targetAmp = Math.min(vel / 300, 0.45);
    }

    // Juno chord frequencies
    const pitchScale = Math.max(0.5, Math.min(vel / 200, 1));
    const junoFreqs = [130.81 * pitchScale, 155.56 * pitchScale, 196.0 * pitchScale, 233.08 * pitchScale];
    const detuneAmounts = [0.998, 1.004, 0.996, 1.003];

    for (let i = 0; i < output.length; i++) {
      const smoothing = isKeys ? (targetAmp > synth.amp ? 0.03 : 0.015) : 0.002;
      synth.amp += (targetAmp - synth.amp) * smoothing;

      let s = 0;

      if (isKeys) {
        // Chorus LFO
        synth.chorusPhase += 0.6 / sr;
        if (synth.chorusPhase >= 1) synth.chorusPhase -= 1;
        const chorusMod = Math.sin(2 * Math.PI * synth.chorusPhase);

        let mix = 0;
        for (let v = 0; v < 4; v++) {
          const detune = detuneAmounts[v] + chorusMod * 0.002;
          const f = junoFreqs[v] * detune;
          synth.junoPhases[v] += f / sr;
          if (synth.junoPhases[v] >= 1) synth.junoPhases[v] -= 1;

          const saw = 2 * synth.junoPhases[v] - 1;
          const pw = 0.5 + chorusMod * 0.15;
          const pulse = synth.junoPhases[v] < pw ? 0.6 : -0.6;
          mix += (saw * 0.5 + pulse * 0.5) * 0.25;
        }

        const cutoff = 0.15 + synth.amp * 0.3;
        synth.filterState += cutoff * (mix - synth.filterState);
        s = synth.filterState * synth.amp;

      } else if (isBone) {
        const slide = Math.min(vel / 300, 1);
        const freq = 29.14 * Math.pow(2, slide);
        synth.phase += freq / sr;
        if (synth.phase >= 1) synth.phase -= 1;

        const p = 2 * Math.PI * synth.phase;
        const raw = Math.sin(p) * 0.35 + Math.sin(p*2) * 0.25 + Math.sin(p*3) * 0.20
                  + Math.sin(p*4) * 0.12 + Math.sin(p*5) * 0.06 + Math.sin(p*6) * 0.03;
        s = Math.max(-0.7, Math.min(raw, 0.7)) * synth.amp;
      } else if (isBubbles) {
        synth.bubbleTimer--;
        if (vel > 5 && synth.bubbleTimer <= 0) {
          const rate = Math.min(vel / 25, 25);
          synth.bubbleTimer = Math.floor(sr / rate * (0.5 + Math.random() * 0.5));
          synth.bubbles.push({ phase: 0, freq: 120 + Math.random() * 400, amp: 0.18 + Math.random() * 0.12, decay: 0.9988 + Math.random() * 0.0008 });
        }
        for (let j = synth.bubbles.length - 1; j >= 0; j--) {
          const b = synth.bubbles[j];
          s += Math.sin(2 * Math.PI * b.phase) * b.amp;
          b.phase += b.freq / sr;
          if (b.phase >= 1) b.phase -= 1;
          b.amp *= b.decay;
          if (b.amp < 0.001) synth.bubbles.splice(j, 1);
        }
        const wNoise = (Math.random() * 2 - 1) * 0.012;
        synth.waterNoise += 0.05 * (wNoise - synth.waterNoise);
        s += synth.waterNoise * Math.min(vel / 80, 1);
      }

      // Record-stop effect
      if (synth.stopAmount > 0.001 && synth.stopBuffer) {
        const buf = synth.stopBuffer;
        const idx = Math.floor(synth.stopOffset);
        if (idx >= 0 && idx < buf.length - 1) {
          const frac = synth.stopOffset - idx;
          const s0 = buf[idx];
          const s1 = buf[idx + 1];
          s += (s0 + frac * (s1 - s0)) * synth.stopAmount;
        }
        synth.stopOffset += Math.max(synth.stopRate, 0);
        synth.stopRate *= 0.9997;
        synth.stopAmount *= 0.9998;
        if (synth.stopRate < 0.01) synth.stopAmount = 0;
      }

      output[i] = s;
    }
  };

  synthGain = audioCtx.createGain();
  synthGain.gain.value = 1;
  synthProcessor.connect(synthGain);
  synthGain.connect(audioCtx.destination);

  // Store synth ref for record stop
  synthProcessor._synth = synth;
}

// --- Sax playback ---
function updateSax() {
  if (!audioCtx || !saxBuffer) return;
  const vel = Math.abs(angularVelocity);

  if (selectedSound === 'saxophone') {
    if (!saxPlaying && vel > 2) {
      saxSource = audioCtx.createBufferSource();
      saxSource.buffer = saxBuffer;
      saxSource.loop = true;
      saxSource.connect(saxGain);
      saxSource.start();
      saxPlaying = true;
    }
    if (saxPlaying) {
      const rate = Math.max(0.5, Math.min(vel / 200, 1));
      saxSource.playbackRate.setTargetAtTime(rate, audioCtx.currentTime, 0.05);
      saxGain.gain.setTargetAtTime(Math.min(vel / 80, 1), audioCtx.currentTime, 0.05);
    }
    if (saxPlaying && vel <= 2) {
      saxSource.stop();
      saxPlaying = false;
    }
  } else {
    if (saxPlaying) {
      saxSource.stop();
      saxPlaying = false;
    }
    saxGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
  }
}

// --- Record stop ---
function triggerRecordStop() {
  if (!audioCtx) return;
  // For sax: grab current buffer data and stop playback
  if (selectedSound === 'saxophone' && saxPlaying && saxBuffer) {
    const data = saxBuffer.getChannelData(0);
    const synth = synthProcessor._synth;
    synth.stopBuffer = data;
    synth.stopOffset = 0; // approximate
    synth.stopRate = 1;
    synth.stopAmount = 0.25;
    saxSource.stop();
    saxPlaying = false;
  }
}

// --- Voice (Web Speech API) ---
let speaking = false;
function speak(velocity) {
  if (speaking || !window.speechSynthesis) return;
  speaking = true;

  const utterance = new SpeechSynthesisUtterance();
  if (velocity > 0) {
    const phrases = ['\u65CB\u8F6C\uFF01', '\u592A\u6781\uFF01', '\u54CE\u5440\uFF01', '\u597D\u7684\u597D\u7684\uFF01', '\u4E0D\u9519\u4E0D\u9519\uFF01', '\u54C7\uFF01', '\u5389\u5BB3\u554A\uFF01'];
    utterance.text = phrases[Math.floor(Math.random() * phrases.length)];
    utterance.lang = 'zh-CN';
    utterance.rate = 0.5;
  } else {
    const phrases = ['faster', 'tai chi', 'keep going', 'beautiful', "don't stop", 'spin it'];
    utterance.text = phrases[Math.floor(Math.random() * phrases.length)];
    utterance.lang = 'en-US';
    utterance.rate = 0.1;
  }
  utterance.onend = () => { speaking = false; };
  utterance.onerror = () => { speaking = false; };
  speechSynthesis.speak(utterance);
}

// --- Main loop ---
function tick() {
  if (!isDragging) {
    if (Math.abs(angularVelocity) > 0.1) {
      rotation += angularVelocity * 0.016;
      angularVelocity *= 0.995;
    } else {
      angularVelocity = 0;
    }
  }

  updateSax();
  drawYinYang();
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
